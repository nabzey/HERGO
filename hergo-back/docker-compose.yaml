services:
  postgres:
    image: postgres:16-alpine
    container_name: hergo_postgres
    environment:
      POSTGRES_USER: zeynab
      POSTGRES_PASSWORD: nouvellesauvegarde
      POSTGRES_DB: hergo
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hergo_back_app
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLOUDINARY_FOLDER: hergo
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
