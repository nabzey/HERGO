services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hergo_back_app
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLOUDINARY_FOLDER: hergo
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
